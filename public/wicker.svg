<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="wickerNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="2.4" numOctaves="2" stitchTiles="stitch" seed="11"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.36  0 0 0 0 0.22  0 0 0 0 0.10  0 0 0 0.5 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="strandH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7A4A2A" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#5E3820" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3B2418" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="strandV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7A4A2A" stop-opacity="0.50"/>
      <stop offset="50%" stop-color="#5E3820" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#3B2418" stop-opacity="0.50"/>
    </linearGradient>
  </defs>

  <!-- Plain weave: alternating warp/weft strands. Top strand on even cells, bottom on odd. -->
  <g>
    <!-- Vertical warp strands (4 columns) -->
    <rect x="4"  y="0" width="8" height="64" rx="3" fill="url(#strandV)"/>
    <rect x="20" y="0" width="8" height="64" rx="3" fill="url(#strandV)"/>
    <rect x="36" y="0" width="8" height="64" rx="3" fill="url(#strandV)"/>
    <rect x="52" y="0" width="8" height="64" rx="3" fill="url(#strandV)"/>

    <!-- Row 1: weft passes OVER cols 0,2 (x=4, x=36) and UNDER cols 1,3 -->
    <g>
      <rect x="0"  y="4" width="20" height="8" rx="3" fill="url(#strandH)"/>
      <rect x="32" y="4" width="20" height="8" rx="3" fill="url(#strandH)"/>
    </g>
    <!-- Row 2: weft over cols 1,3 -->
    <g>
      <rect x="16" y="20" width="20" height="8" rx="3" fill="url(#strandH)"/>
      <rect x="48" y="20" width="16" height="8" rx="3" fill="url(#strandH)"/>
      <rect x="0"  y="20" width="4"  height="8" rx="3" fill="url(#strandH)"/>
    </g>
    <!-- Row 3: same as row 1 -->
    <g>
      <rect x="0"  y="36" width="20" height="8" rx="3" fill="url(#strandH)"/>
      <rect x="32" y="36" width="20" height="8" rx="3" fill="url(#strandH)"/>
    </g>
    <!-- Row 4: same as row 2 -->
    <g>
      <rect x="16" y="52" width="20" height="8" rx="3" fill="url(#strandH)"/>
      <rect x="48" y="52" width="16" height="8" rx="3" fill="url(#strandH)"/>
      <rect x="0"  y="52" width="4"  height="8" rx="3" fill="url(#strandH)"/>
    </g>
  </g>

  <!-- Subtle fibre noise overlay -->
  <rect width="64" height="64" filter="url(#wickerNoise)" opacity="0.6"/>
</svg>
