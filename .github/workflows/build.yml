name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily at 07:00 IST (01:30 UTC) so sheet edits go live automatically.
  schedule:
    - cron: '30 1 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --no-fund --no-audit

      - name: Astro check + build
        env:
          GITHUB_PAGES: 'true'
          MENU_SHEET_ID: ${{ secrets.MENU_SHEET_ID }}
          MENU_SHEET_GID: ${{ secrets.MENU_SHEET_GID }}
          EVENTS_SHEET_ID: ${{ secrets.EVENTS_SHEET_ID }}
          EVENTS_SHEET_GID: ${{ secrets.EVENTS_SHEET_GID }}
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
